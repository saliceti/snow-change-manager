name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deployment_result:
        description: Result of the deployment. Set to fail to simulate deployment failure. The default is pass.
        default: pass
        type: choice
        options:
        - pass
        - fail
      test_result:
        description: Result of the smoke test. Set to fail to simulate test failure. The default is pass.
        default: pass
        type: choice
        options:
        - pass
        - fail

jobs:

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run unit tests 1
        run: |
          echo Running unit tests 1...
          sleep 5

  integration-tests-standard:
    name: Run integration tests on standard ServiceNow developer instance
    runs-on: ubuntu-latest
    needs: [unit-tests]
    environment: snow-standard-dev
    env:
      SNOW_HOST: dev185914.service-now.com
      SNOW_USER: ${{ secrets.SNOW_USER }}
      SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
      SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run integration tests
        run: python test_integration_standard.py

  integration-tests-nhs-dev:
    name: Run integration tests on custom NHS ServiceNow dev instance
    runs-on: ubuntu-latest
    needs: [integration-tests-standard]
    environment: nhs-dev
    env:
      SNOW_HOST: nhsdigitaldev.service-now.com
      SNOW_CLIENT_ID: ${{ secrets.SNOW_CLIENT_ID }}
      SNOW_CLIENT_SECRET: ${{ secrets.SNOW_CLIENT_SECRET }}
      SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}
      SNOW_PROFILE: ${{ secrets.SNOW_PROFILE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run integration tests
        run: python test_integration_custom.py

  create-snow-change:
    name: Create ServiceNow change
    runs-on: ubuntu-latest
    needs: [integration-tests-nhs-dev]
    permissions:
      contents: write
      actions: read
    environment: nhs-dev
    env:
      SNOW_HOST: nhsdigitaldev.service-now.com
      SNOW_CLIENT_ID: ${{ secrets.SNOW_CLIENT_ID }}
      SNOW_CLIENT_SECRET: ${{ secrets.SNOW_CLIENT_SECRET }}
      SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}
      SNOW_PROFILE: ${{ secrets.SNOW_PROFILE }}
      SNOW_AUTH: oauth
      SNOW_CUSTOM: true
    outputs:
      CHANGE_NUMBER: ${{ steps.create-change.outputs.CHANGE_NUMBER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        id: tag
        env:
          DEFAULT_BUMP: patch
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v

      - name: List commits
        id: commit-list
        run: ./snow_change_helper.py list-commits
        env:
          COMMITS_CONTEXT: ${{ toJSON(github.event.commits) }}

      - name: Extract PR and Jira info
        if: github.event_name == 'push'
        id: extract-pr-jira
        run: ./snow_change_helper.py extract-pr-jira
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_HTML_URL: ${{ github.event.repository.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build change HTML
        id: build-change-html
        run: ./snow_change_helper.py build-change-html
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.tag }}
          PR_NUMBER: ${{ steps.extract-pr-jira.outputs.pull_request_number }}
          PR_LINK: ${{ steps.extract-pr-jira.outputs.pull_request_link }}
          JIRA_REFERENCE: ${{ steps.extract-pr-jira.outputs.jira_reference }}
          JIRA_LINK: ${{ steps.extract-pr-jira.outputs.jira_link }}
          COMMITS_HTML: ${{ steps.commit-list.outputs.COMMITS_HTML }}
          WORKFLOW_RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create and schedule change
        id: create-change
        shell: bash -euo pipefail {0}
        run: |
          ./snow_change_helper.py snow-command create \
            --short-description "$SHORT_DESCRIPTION" \
            --standard-change "$SNOW_STANDARD_CHANGE" | tee create_output.env

          source create_output.env

          ./snow_change_helper.py snow-command --verbose post-work-note \
            --number "$CHANGE_NUMBER" \
            --text "[code]$CHANGE_HTML[/code]"

          echo "Change created successfully and scheduled immediately"

          {
            echo "CHANGE_SYS_ID=$CHANGE_SYS_ID"
            echo "CHANGE_NUMBER=$CHANGE_NUMBER"
            echo "CHANGE_LINK=$CHANGE_LINK"
          } >> "$GITHUB_OUTPUT"
        env:
          SHORT_DESCRIPTION: ${{ steps.build-change-html.outputs.SHORT_DESCRIPTION }}
          CHANGE_HTML: ${{ steps.build-change-html.outputs.CHANGE_HTML }}

      - name: Download test job log
        id: download-test-job-log
        run: |
          ./snow_change_helper.py --output-mode stdout github-actions-logs --run-id "$RUN_ID" --job "$TEST_JOB_NAME" > job.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.run_id }}
          TEST_JOB_NAME: Run integration tests on custom NHS ServiceNow dev instance

      - name: Post test job log
        run: |
          cat job.log | ./snow_change_helper.py snow-command --verbose post-work-note \
            --number "$CHANGE_NUMBER" \
            --stdin
        env:
          CHANGE_NUMBER: ${{ steps.create-change.outputs.CHANGE_NUMBER }}

      - name: Add create change summary
        run: ./snow_change_helper.py add-create-change-summary
        env:
          CHANGE_NUMBER: ${{ steps.create-change.outputs.CHANGE_NUMBER }}
          CHANGE_LINK: ${{ steps.create-change.outputs.CHANGE_LINK }}
          CHANGE_SYS_ID: ${{ steps.create-change.outputs.CHANGE_SYS_ID }}
          CHANGE_HTML: ${{ steps.build-change-html.outputs.CHANGE_HTML }}
          SHORT_DESCRIPTION: ${{ steps.build-change-html.outputs.SHORT_DESCRIPTION }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [create-snow-change]
    environment: nhs-dev
    env:
      SNOW_HOST: nhsdigitaldev.service-now.com
      SNOW_CLIENT_ID: ${{ secrets.SNOW_CLIENT_ID }}
      SNOW_CLIENT_SECRET: ${{ secrets.SNOW_CLIENT_SECRET }}
      SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}
      SNOW_PROFILE: ${{ secrets.SNOW_PROFILE }}
      SNOW_AUTH: oauth
      SNOW_CUSTOM: true
    outputs:
      CHANGE_NUMBER: ${{ needs.create-snow-change.outputs.CHANGE_NUMBER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start change
        run: |
          ./snow_change_helper.py snow-command --verbose implement --number "$CHANGE_NUMBER"

          echo Change started successfully. Ready for deployment.
        env:
          CHANGE_NUMBER: ${{ needs.create-snow-change.outputs.CHANGE_NUMBER }}

      - name: Deploy software
        id: deploy-software
        run: |
          echo Deploying software... | tee -a deployment.log
          sleep 5

          if [[ "${{ inputs.deployment_result }}" = "fail" ]]; then
            echo Error: Deployment has failed. | tee -a deployment.log
            {
              echo 'LOG<<EOF'
              cat deployment.log
              echo EOF
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo Deployed software successfully | tee -a deployment.log
          {
            echo 'LOG<<EOF'
            cat deployment.log
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post deployment log
        if: always()
        run: |
          if [[ "${{ job.status }}" != "success" ]]; then
            message="The deployment was unsuccessul"
          else
            message="The deployment was successul"
          fi

          echo "$message"

          ./snow_change_helper.py snow-command --verbose post-work-note --number "$CHANGE_NUMBER" --text "$message
          Deployment log:
          ${{ steps.deploy-software.outputs.LOG}}"
        env:
          CHANGE_NUMBER: ${{ needs.create-snow-change.outputs.CHANGE_NUMBER }}

      - name: Run smoke test
        id: smoke-test
        run: |
          echo Testing the deployment... | tee -a test.log
          sleep 5

          if [[ "${{ inputs.test_result }}" = "fail" ]]; then
            echo Error: The smoke tests 1,2,3 have failed. | tee -a test.log
            {
              echo 'LOG<<EOF'
              cat test.log
              echo EOF
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo The smoke tests 1,2,3 were successful | tee -a test.log
          {
            echo 'LOG<<EOF'
            cat test.log
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post smoke test log
        if: always() && steps.deploy-software.outcome == 'success'
        run: |
          if [[ "${{ job.status }}" != "success" ]]; then
            message="The test was unsuccessul"
          else
            message="The test was successul"
          fi

          echo "$message"

          ./snow_change_helper.py snow-command --verbose post-work-note --number "$CHANGE_NUMBER" --text "$message
          Smoke test log:
          ${{ steps.smoke-test.outputs.LOG}}"
        env:
          CHANGE_NUMBER: ${{ needs.create-snow-change.outputs.CHANGE_NUMBER }}

  review-change:
    name: Progress ServiceNow change to Review
    if: always()
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: nhs-dev
    env:
      SNOW_HOST: nhsdigitaldev.service-now.com
      SNOW_CLIENT_ID: ${{ secrets.SNOW_CLIENT_ID }}
      SNOW_CLIENT_SECRET: ${{ secrets.SNOW_CLIENT_SECRET }}
      SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}
      SNOW_PROFILE: ${{ secrets.SNOW_PROFILE }}
      SNOW_AUTH: oauth
      SNOW_CUSTOM: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Progress to Review
        run: |
          if [[ "${{ needs.deploy.result }}" = "success" ]]; then
            result=successful
          else
            result=unsuccessful
          fi

          ./snow_change_helper.py snow-command --verbose review --number "$CHANGE_NUMBER" --result "$result"

          echo Change progressed to review with result: $result
        env:
          CHANGE_NUMBER: ${{ needs.deploy.outputs.CHANGE_NUMBER }}
