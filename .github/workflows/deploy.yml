name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deployment_result:
        description: Result of the deployment. Set to fail to simulate deployment failure. The default is pass.
        default: pass
        type: choice
        options:
        - pass
        - fail
      test_result:
        description: Result of the smoke test. Set to fail to simulate test failure. The default is pass.
        default: pass
        type: choice
        options:
        - pass
        - fail

env:
  SNOW_HOST: dev185914.service-now.com
  SNOW_USER: ${{ secrets.SNOW_USER }}
  SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
  SNOW_STANDARD_CHANGE: ${{ secrets.SNOW_STANDARD_CHANGE }}

jobs:

  # unit-tests:
  #   name: Run unit tests
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     pull-requests: read

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v5

  #     - name: Run unit tests 1
  #       run: |
  #         echo Running unit tests 1...
  #         # sleep 5
  #         echo '${{ toJSON(github.event) }}'

  # integration-tests:
  #   name: Run integration tests
  #   runs-on: ubuntu-latest
  #   needs: [unit-tests]

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v5

  #     - name: Run integration tests
  #       run: python test_integration.py

  create-snow-change:
    name: Create ServiceNow change
    runs-on: ubuntu-latest
    # needs: [integration-tests]
    permissions:
      contents: write
    outputs:
      CHANGE_SYS_ID: ${{ steps.create-change.outputs.CHANGE_SYS_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v

      - name: List commits
        id: commit-list
        shell: python -u {0}
        run: |
          import json, os, sys

          commit_list = json.loads(os.environ["COMMITS_CONTEXT"])
          if not commit_list:
            sys.exit(0)

          rows = ""
          for c in commit_list:
            cid = c['id']
            author = c['author']['username']
            message = c['message'].strip().replace('\n', ' ')
            rows += f"<tr><td><code>{cid}</code></td><td>{author}</td><td>{message}</td></tr>\n"

          html = (
            "<table border='1' cellpadding='6' cellspacing='0' style='border-collapse: collapse;'>"
            "<thead><tr><th>Commit</th><th>Author</th><th>Message</th></tr></thead>"
            f"<tbody>{rows}</tbody>"
            "</table>"
          )

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            print('COMMITS_HTML<<EOF', file=f)
            print(html, file=f)
            print('EOF', file=f)
        env:
          COMMITS_CONTEXT: ${{ toJSON(github.event.commits) }}

      - name: Extract PR and Jira info
        if: github.event_name == 'push'
        id: extract-pr-jira
        uses: actions/github-script@v7
        with:
          script: |
            const message = context.payload.head_commit?.message ?? '';

            const prNumber = message.match(/#(\d+)/)?.[1] ?? '';
            const jiraReference = message.match(/\[([A-Z][A-Z0-9]+-\d+)\]/)?.[1] ?? '';

            let jiraLink = '';

            if (prNumber) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: Number(prNumber),
              });

              const body = pr.body ?? '';
              jiraLink =
                body.match(/https:\/\/nhsd-jira\.digital\.nhs\.uk\/browse\/[A-Z][A-Z0-9]+-\d+/)?.[0] ?? '';
            }

            if (jiraLink == '' && jiraReference != '') {
              core.info(`Jira link not found. Using Jira reference ${jiraReference} from PR title.`)
              jiraLink = `https://nhsd-jira.digital.nhs.uk/browse/${jiraReference}`
            }

            core.setOutput('pull_request_number', prNumber)
            core.setOutput('pull_request_link', `${context.payload.repository.html_url}/pull/${prNumber}`)
            core.setOutput('jira_reference', jiraReference)
            core.setOutput('jira_link', jiraLink)

            core.info(`pull_request_number=${prNumber}`)
            core.info(`pull_request_link=${context.payload.repository.html_url}/pull/${prNumber}`)
            core.info(`jira_reference=${jiraReference}`)
            core.info(`jira_link=${jiraLink}`)

      - name: Build change HTML
        id: build-change-html
        shell: python -u {0}
        run: |
          import os

          release_version = os.environ['RELEASE_VERSION']
          short_description = f"Release Manage breast screening version {release_version}"
          workflow_run_link = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          pr_number    = os.environ['PR_NUMBER']
          pr_link      = os.environ['PR_LINK']
          jira_ref     = os.environ['JIRA_REFERENCE']
          jira_link    = os.environ['JIRA_LINK']
          sha          = "${{ github.sha }}"
          actor        = "${{ github.actor }}"
          commits_html = os.environ['COMMITS_HTML']

          html = f"""<h2>Properties</h2>
          <table border="1" cellpadding="6" cellspacing="0" style="border-collapse: collapse;">
            <thead><tr><th>Property</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Release version</td><td><code>{release_version}</code></td></tr>
              <tr><td>Commit SHA</td><td><code>{sha}</code></td></tr>
              <tr><td>Workflow run</td><td><a href="{workflow_run_link}">Open workflow run</a></td></tr>
              <tr><td>Triggered by</td><td>{actor}</td></tr>
              <tr><td>Pull request</td><td><a href="{pr_link}">#{pr_number}</a></td></tr>
              <tr><td>Jira ticket</td><td><a href="{jira_link}">{jira_ref}</a></td></tr>
            </tbody>
          </table>
          <h3>Commits</h3>
          {commits_html}"""

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            print('CHANGE_HTML<<EOF', file=f)
            print(html, file=f)
            print('EOF', file=f)
            print(f'SHORT_DESCRIPTION={short_description}', file=f)
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.tag }}
          PR_NUMBER: ${{ steps.extract-pr-jira.outputs.pull_request_number }}
          PR_LINK: ${{ steps.extract-pr-jira.outputs.pull_request_link }}
          JIRA_REFERENCE: ${{ steps.extract-pr-jira.outputs.jira_reference }}
          JIRA_LINK: ${{ steps.extract-pr-jira.outputs.jira_link }}
          COMMITS_HTML: ${{ steps.commit-list.outputs.COMMITS_HTML }}

      - name: Create and schedule change
        id: create-change
        shell: python -u {0}
        run: |
          import os, subprocess

          short_description = os.environ['SHORT_DESCRIPTION']
          change_html       = os.environ['CHANGE_HTML']

          result = subprocess.run(
            [
              "./snow_change_manager.py", "create",
              "--short-description", short_description,
              "--standard-change", os.environ['SNOW_STANDARD_CHANGE'],
            ],
            capture_output=True, text=True, check=True
          )

          snow_vars = {}
          for line in result.stdout.splitlines():
            if '=' in line:
              k, v = line.split('=', 1)
              snow_vars[k.strip()] = v.strip()

          change_sys_id = snow_vars.get('CHANGE_SYS_ID', '')
          change_number = snow_vars.get('CHANGE_NUMBER', '')
          change_link   = snow_vars.get('CHANGE_LINK', '')

          print("Change created successfully and scheduled immediately")

          subprocess.run(
            [
              "./snow_change_manager.py", "post-comment",
              "--sys-id", change_sys_id,
              "--comment", f"[code]{change_html}[/code]",
            ],
            check=True
          )

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"CHANGE_SYS_ID={change_sys_id}\n")
            f.write(f"CHANGE_NUMBER={change_number}\n")
            f.write(f"CHANGE_LINK={change_link}\n")
        env:
          SHORT_DESCRIPTION: ${{ steps.build-change-html.outputs.SHORT_DESCRIPTION }}
          CHANGE_HTML: ${{ steps.build-change-html.outputs.CHANGE_HTML }}

      - name: Add create change summary
        shell: python -u {0}
        run: |
          import os

          change_number     = os.environ['CHANGE_NUMBER']
          change_link       = os.environ['CHANGE_LINK']
          change_sys_id     = os.environ['CHANGE_SYS_ID']
          change_html       = os.environ['CHANGE_HTML']
          short_description = os.environ['SHORT_DESCRIPTION']

          header = f"""<h2>ServiceNow Change</h2>
          <table>
            <thead><tr><th>Property</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Change number</td><td><a href="{change_link}">{change_number}</a></td></tr>
              <tr><td>Short description</td><td>{short_description}</td></tr>
              <tr><td>Sys ID</td><td><code>{change_sys_id}</code></td></tr>
            </tbody>
          </table>"""

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
            f.write(header + "\n")
            f.write(change_html + "\n")
        env:
          CHANGE_NUMBER: ${{ steps.create-change.outputs.CHANGE_NUMBER }}
          CHANGE_LINK: ${{ steps.create-change.outputs.CHANGE_LINK }}
          CHANGE_SYS_ID: ${{ steps.create-change.outputs.CHANGE_SYS_ID }}
          CHANGE_HTML: ${{ steps.build-change-html.outputs.CHANGE_HTML }}
          SHORT_DESCRIPTION: ${{ steps.build-change-html.outputs.SHORT_DESCRIPTION }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [create-snow-change]

    outputs:
      CHANGE_SYS_ID: ${{ needs.create-snow-change.outputs.CHANGE_SYS_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start change
        run: |
          ./snow_change_manager.py update --sys-id $CHANGE_SYS_ID --state Implement

          echo Change started successfully. Ready for deployment.
        env:
          CHANGE_SYS_ID: ${{ needs.create-snow-change.outputs.CHANGE_SYS_ID }}

      - name: Deploy software
        id: deploy-software
        run: |
          echo Deploying software... | tee -a deployment.log
          sleep 5

          if [[ "${{ inputs.deployment_result }}" = "fail" ]]; then
            echo Error: Deployment has failed. | tee -a deployment.log
            {
              echo 'LOG<<EOF'
              cat deployment.log
              echo EOF
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo Deployed software successfully | tee -a deployment.log
          {
            echo 'LOG<<EOF'
            cat deployment.log
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Review change
        if: always()
        run: |
          ./snow_change_manager.py update --sys-id $CHANGE_SYS_ID --state Review

          if [[ "${{ job.status }}" != "success" ]]; then
            message="The deployment was unsuccessul"
          else
            message="The deployment was successul"
          fi

          echo "$message"

          ./snow_change_manager.py post-comment \
            --sys-id $CHANGE_SYS_ID \
            --comment "$message
            Deployment log:
            ${{ steps.deploy-software.outputs.LOG}}"
        env:
          CHANGE_SYS_ID: ${{ needs.create-snow-change.outputs.CHANGE_SYS_ID }}

      - name: Run smoke test
        id: smoke-test
        run: |
          echo Testing the deployment... | tee -a test.log
          sleep 5

          if [[ "${{ inputs.test_result }}" = "fail" ]]; then
            echo Error: The smoke tests 1,2,3 have failed. | tee -a test.log
            {
              echo 'LOG<<EOF'
              cat test.log
              echo EOF
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo The smoke tests 1,2,3 were successful | tee -a test.log
          {
            echo 'LOG<<EOF'
            cat test.log
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Update change
        if: always() && steps.deploy-software.outcome == 'success'
        run: |
          if [[ "${{ job.status }}" != "success" ]]; then
            message="The test was unsuccessul"
          else
            message="The test was successul"
          fi

          echo "$message"

          ./snow_change_manager.py post-comment \
            --sys-id $CHANGE_SYS_ID \
            --comment "$message
            Smoke test log:
            ${{ steps.smoke-test.outputs.LOG}}"
        env:
          CHANGE_SYS_ID: ${{ needs.create-snow-change.outputs.CHANGE_SYS_ID }}

  close-change:
    name: Close ServiceNow change
    if: always()
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Close change
        if: needs.deploy.outputs.CHANGE_SYS_ID
        run: |
          if [[ "${{ needs.deploy.result }}" = "success" ]]; then
            result=successful
          else
            result=unsuccessful
          fi

          ./snow_change_manager.py update --sys-id $CHANGE_SYS_ID --state Closed --result $result

          echo Change closed with result: $result
        env:
          CHANGE_SYS_ID: ${{ needs.deploy.outputs.CHANGE_SYS_ID }}
